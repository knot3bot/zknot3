services:
  zknot3-validator-1:
    image: zknot3:latest
    container_name: zknot3-validator-1
    hostname: validator-1
    restart: unless-stopped
    command: ["-c", "/etc/zknot3/config.json"]
    ports:
      - "9000:9000"
      - "8080:8080"
      - "8081:8081"
    volumes:
      - zknot3-data-1:/var/lib/zknot3
      - ./configs/validator-1.json:/etc/zknot3/config.json:ro
    networks:
      zknot3-net:
        ipv4_address: 172.20.0.2

  zknot3-validator-2:
    image: zknot3:latest
    container_name: zknot3-validator-2
    hostname: validator-2
    restart: unless-stopped
    command: ["-c", "/etc/zknot3/config.json"]
    ports:
      - "9010:9000"
      - "8090:8080"
      - "8091:8081"
    volumes:
      - zknot3-data-2:/var/lib/zknot3
      - ./configs/validator-2.json:/etc/zknot3/config.json:ro
    networks:
      zknot3-net:
        ipv4_address: 172.20.0.3

  zknot3-validator-3:
    image: zknot3:latest
    container_name: zknot3-validator-3
    hostname: validator-3
    restart: unless-stopped
    command: ["-c", "/etc/zknot3/config.json"]
    ports:
      - "9020:9000"
      - "8100:8080"
      - "8101:8081"
    volumes:
      - zknot3-data-3:/var/lib/zknot3
      - ./configs/validator-3.json:/etc/zknot3/config.json:ro
    networks:
      zknot3-net:
        ipv4_address: 172.20.0.4

  zknot3-validator-4:
    image: zknot3:latest
    container_name: zknot3-validator-4
    hostname: validator-4
    restart: unless-stopped
    command: ["-c", "/etc/zknot3/config.json"]
    ports:
      - "9030:9000"
      - "8110:8080"
      - "8111:8081"
    volumes:
      - zknot3-data-4:/var/lib/zknot3
      - ./configs/validator-4.json:/etc/zknot3/config.json:ro
    networks:
      zknot3-net:
        ipv4_address: 172.20.0.5

  zknot3-fullnode:
    image: zknot3:latest
    container_name: zknot3-fullnode
    restart: unless-stopped
    command: ["-c", "/etc/zknot3/config.json"]
    ports:
      - "9040:9000"
      - "8120:8080"
    volumes:
      - zknot3-fullnode-data:/var/lib/zknot3
      - ./configs/fullnode.json:/etc/zknot3/config.json:ro
    depends_on:
      - zknot3-validator-1
      - zknot3-validator-2
      - zknot3-validator-3
      - zknot3-validator-4
    networks:
      zknot3-net:

volumes:
  zknot3-data-1:
  zknot3-data-2:
  zknot3-data-3:
  zknot3-data-4:
  zknot3-fullnode-data:

networks:
  zknot3-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
