      - zknot3-data-3:/var/lib/zknot3
      - ./configs/validator-3.json.tmpl:/etc/zknot3/config.template.json:ro
    networks:
      zknot3-net:
        ipv4_address: 172.20.0.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  zknot3-validator-4:
    image: zknot3:latest
