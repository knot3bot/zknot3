services:
  zknot3-validator-1:
    image: zknot3:latest
    container_name: zknot3-validator-1
    hostname: validator-1
    restart: unless-stopped
    privileged: true
    command: ["-c", "/etc/zknot3/config.json"]
    env_file:
      - ./.env
    ports:
      - "9003:9003"     # JSON-RPC / REST (and gRPC reserved) - container:9003
      - "8083:8083"     # P2P
      - "9133:9133"     # Metrics
    volumes:
      - zknot3-data-1:/var/lib/zknot3
      - ./configs/validator-1.json.tmpl:/etc/zknot3/config.template.json:ro
    networks:
      zknot3-net:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  zknot3-validator-2:
    image: zknot3:latest
    container_name: zknot3-validator-2
    hostname: validator-2
    restart: unless-stopped
    privileged: true
    command: ["-c", "/etc/zknot3/config.json"]
    env_file:
      - ./.env
    ports:
      - "9013:9003"
      - "8093:8083"
      - "9143:9133"
    volumes:
      - zknot3-data-2:/var/lib/zknot3
      - ./configs/validator-2.json.tmpl:/etc/zknot3/config.template.json:ro
