# Multi-Node Integration Test Environment
# 
# This docker-compose file sets up a test network with:
# - 4 validator nodes (forming a quorum)
# - 1 full node (for RPC queries)
# - Shared network for P2P communication

services:
  # ============================================
  # Validator Nodes (4 nodes = minimum quorum)
  # ============================================
  
  zknot3-validator-1:
    image: zknot3:latest
    container_name: zknot3-validator-1
    hostname: validator-1
    restart: unless-stopped
    ports:
      - "19001:9003"   # RPC
      - "18081:8083"   # P2P
      - "18011:9133"   # Metrics
    volumes:
      - validator1-data:/var/lib/zknot3
      - ./configs/validator-1.json.tmpl:/etc/zknot3/config.template.json:ro
    env_file:
      - ./.env
    environment:
      - ZKNOT3_VALIDATOR_NAME=validator-1
      - ZKNOT3_VALIDATOR_PORT=18081
      - ZKNOT3_PEER_ID=validator-1
      - RUST_LOG=info
    command: ["-c", "/etc/zknot3/config.json", "--dev", "--validator"]
    networks:
      - zknot3-testnet

  zknot3-validator-2:
    image: zknot3:latest
    container_name: zknot3-validator-2
    hostname: validator-2
    restart: unless-stopped
    ports:
      - "19002:9003"   # RPC
      - "18082:8083"   # P2P
      - "18012:9133"   # Metrics
    volumes:
      - validator2-data:/var/lib/zknot3
      - ./configs/validator-2.json.tmpl:/etc/zknot3/config.template.json:ro
    env_file:
      - ./.env
    environment:
      - ZKNOT3_VALIDATOR_NAME=validator-2
      - ZKNOT3_VALIDATOR_PORT=18082
      - ZKNOT3_PEER_ID=validator-2
      - RUST_LOG=info
    command: ["-c", "/etc/zknot3/config.json", "--dev", "--validator"]
    networks:
      - zknot3-testnet

  zknot3-validator-3:
    image: zknot3:latest
    container_name: zknot3-validator-3
    hostname: validator-3
    restart: unless-stopped
    ports:
      - "19003:9003"   # RPC
      - "18083:8083"   # P2P
      - "18013:9133"   # Metrics
    volumes:
      - validator3-data:/var/lib/zknot3
      - ./configs/validator-3.json.tmpl:/etc/zknot3/config.template.json:ro
    env_file:
      - ./.env
    environment:
      - ZKNOT3_VALIDATOR_NAME=validator-3
      - ZKNOT3_VALIDATOR_PORT=18083
      - ZKNOT3_PEER_ID=validator-3
      - RUST_LOG=info
    command: ["-c", "/etc/zknot3/config.json", "--dev", "--validator"]
    networks:
      - zknot3-testnet

  zknot3-validator-4:
    image: zknot3:latest
    container_name: zknot3-validator-4
    hostname: validator-4
    restart: unless-stopped
    ports:
      - "19004:9003"   # RPC
      - "18084:8083"   # P2P
      - "18014:9133"   # Metrics
    volumes:
      - validator4-data:/var/lib/zknot3
      - ./configs/validator-4.json.tmpl:/etc/zknot3/config.template.json:ro
    env_file:
      - ./.env
    environment:
      - ZKNOT3_VALIDATOR_NAME=validator-4
      - ZKNOT3_VALIDATOR_PORT=18084
      - ZKNOT3_PEER_ID=validator-4
      - RUST_LOG=info
    command: ["-c", "/etc/zknot3/config.json", "--dev", "--validator"]
    networks:
      - zknot3-testnet

  # ============================================
  # Full Node (for RPC queries)
  # ============================================
  
  zknot3-fullnode:
    image: zknot3:latest
    container_name: zknot3-fullnode
    hostname: fullnode
    restart: unless-stopped
    ports:
      - "19005:9003"   # RPC
      - "18085:8083"   # P2P
      - "18015:9133"   # Metrics
    volumes:
      - fullnode-data:/var/lib/zknot3
      - ./configs/fullnode.json.tmpl:/etc/zknot3/config.template.json:ro
    env_file:
      - ./.env
    environment:
      - ZKNOT3_PEER_ID=fullnode
      - RUST_LOG=info
    command: ["-c", "/etc/zknot3/config.json", "--dev"]
    networks:
      - zknot3-testnet
    depends_on:
      zknot3-validator-1:
        condition: service_started
      zknot3-validator-2:
        condition: service_started
      zknot3-validator-3:
        condition: service_started
      zknot3-validator-4:
        condition: service_started

  # ============================================
  # Test Orchestrator
  # ============================================
  
  zknot3-test-runner:
    image: zknot3:latest
    container_name: zknot3-test-runner
    restart: "no"
    command: ["sleep", "infinity"]  # Keep running for manual testing
    environment:
      - VALIDATOR1_RPC=http://zknot3-validator-1:9003
      - VALIDATOR2_RPC=http://zknot3-validator-2:9003
      - VALIDATOR3_RPC=http://zknot3-validator-3:9003
      - VALIDATOR4_RPC=http://zknot3-validator-4:9003
      - FULLNODE_RPC=http://zknot3-fullnode:9003
    networks:
      - zknot3-testnet
    depends_on:
      zknot3-fullnode:
        condition: service_started

volumes:
  validator1-data:
  validator2-data:
  validator3-data:
  validator4-data:
  fullnode-data:

networks:
  zknot3-testnet:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
