# Full Node Configuration (Testnet)

[network]
bind_address = "0.0.0.0"
rpc_port = 9003
p2p_enabled = true
p2p_address = "0.0.0.0"
p2p_port = 8083
local_peer_id = "fullnode"
bootstrap_peers = ["validator-1:8083", "validator-2:8083", "validator-3:8083", "validator-4:8083"]
max_connections = 256

[consensus]
validator_enabled = false
epoch_duration_secs = 60

[storage]
data_dir = "/var/lib/zknot3"
object_store_path = "objects"
checkpoint_store_path = "checkpoints"
cache_size = 536870912
enable_compaction = false

[vm]
max_gas_budget = 10000000
min_gas_price = 100
max_bytecode_size = 65536

[logging]
level = 2
enable_file = false
enable_stderr = true
